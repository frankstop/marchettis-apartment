name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Geoapify API key from secret
        # Replaces the placeholder in config.js directly — no separate file created
        run: |
          sed -i "s/GEOAPIFY_KEY_OVERRIDE.*$/GEOAPIFY_KEY_OVERRIDE = '${{ secrets.GEOAPIFY_KEY }}';/" js/config.local.js
          # Also remove config.local.js from the deployed artifact (key goes inline)
          sed -i "s|window.GEOAPIFY_KEY_OVERRIDE.*|window.GEOAPIFY_KEY_OVERRIDE = '${{ secrets.GEOAPIFY_KEY }}';|" js/config.local.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
